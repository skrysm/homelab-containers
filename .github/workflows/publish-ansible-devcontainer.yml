name: Publish Ansible devcontainer image
run-name: "Publish Ansible devcontainer image | ${{ github.event_name == 'workflow_dispatch' && 'Manual' || github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || github.event_name == 'push' && 'Push' || github.event_name }}"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-ansible-devcontainer.yml"
      - "ansible-devcontainer/**"
  pull_request: # mainly for Dependabot update PRs
    paths:
      - ".github/workflows/publish-ansible-devcontainer.yml"
      - "ansible-devcontainer/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare image build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image
        uses: docker/build-push-action@v7
        env:
          # See: https://github.com/docker/build-push-action/tree/v7/#environment-variables
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./ansible-devcontainer
          platforms: linux/amd64
          load: true
          tags: ansible-devcontainer:candidate

      - name: Detect Ansible version
        id: version
        shell: pwsh
        run: |
          $version = ./ansible-devcontainer/Get-AnsibleVersion.ps1 -Image ansible-devcontainer:candidate

          "version=$version" >> $env:GITHUB_OUTPUT

          @(
              "## Ansible version"
              ""
              "**Detected version:** ``$version``"
          ) >> $env:GITHUB_STEP_SUMMARY

      - name: Test Ansible devcontainer
        shell: pwsh
        run: ./ansible-devcontainer/test/Test-AnsibleContainer.ps1 -Image ansible-devcontainer:candidate -GitHubOutput
