name: Publish Unbound image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  pull_request: # mainly for Dependabot update PRs
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  schedule:
    # Every day at 04:23 UTC.
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FINAL_IMAGE_NAME: ghcr.io/${{ github.repository }}/unbound
  # Don't push the image from PRs.
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    name: Build and test image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build version probe image
        uses: docker/build-push-action@v7
        with:
          context: ./unbound
          platforms: linux/amd64
          load: true
          tags: homelab-unbound:local

      - name: Detect Unbound version
        id: version
        shell: pwsh
        run: ./unbound/Get-UnboundVersion.ps1 -Image homelab-unbound:local -GitHubOutputName version

      - name: Test Unbound container
        shell: pwsh
        run: ./unbound/test/Test-UnboundContainer.ps1 -Image homelab-unbound:local -GitHubOutput

  # NOTE: We still do this job on PRs - even though we don't push the image - to detect any problems
  #   inside this workflow before the PR is merged to the main branch.
  publish:
    name: Publish image${{ github.event_name == 'pull_request' && ' (dry run)' || '' }}
    needs: build
    runs-on: ubuntu-latest
    outputs:
      should_build_image: ${{ steps.publish.outputs.should_build_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        # NOTE: We skip this step here to make sure that the image can't be pushed below (by accident).
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to publish
        id: publish
        shell: pwsh
        run: |
          $tag = "${{ env.FINAL_IMAGE_NAME }}:${{ needs.build.outputs.version }}"

          if ("${{ github.event_name }}" -eq "pull_request") {
              "should_build_image=true" >> $env:GITHUB_OUTPUT
              Write-Host "Pull request run. Building publish image without pushing."
              exit 0
          }

          docker manifest inspect "$tag" *> $null
          $tagExists = $LASTEXITCODE -eq 0

          if ($tagExists) {
              Write-Host "Image tag already exists: $tag"
          }
          else {
              Write-Host "Image tag does not exist yet: $tag"
          }

          if ("${{ github.event_name }}" -eq "schedule" -and $tagExists) {
              "should_build_image=false" >> $env:GITHUB_OUTPUT
              Write-Host "Scheduled run found no new Unbound version. Skipping publish."
          }
          else {
              "should_build_image=true" >> $env:GITHUB_OUTPUT
              Write-Host "Publishing image for Unbound ${{ needs.build.outputs.version }}."
          }

      - name: Set up QEMU
        if: steps.publish.outputs.should_build_image == 'true'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,arm

      - name: Publish multi-platform image${{ github.event_name == 'pull_request' && ' (dry run)' || '' }}
        if: steps.publish.outputs.should_build_image == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./unbound
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: |
            ${{ env.FINAL_IMAGE_NAME }}:${{ needs.build.outputs.version }}
            ${{ env.FINAL_IMAGE_NAME }}:latest

  verify-published:
    name: Verify published image (${{ matrix.platform }})

    needs:
      - build
      - publish

    if: needs.publish.outputs.should_build_image == 'true' && github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            qemu_platform: ""
          - platform: linux/arm64
            qemu_platform: arm64
          - platform: linux/arm/v7
            qemu_platform: arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.qemu_platform != ''
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.qemu_platform }}

      - name: Pull published image
        shell: pwsh
        run: |
          $image = '${{ env.FINAL_IMAGE_NAME }}:${{ needs.build.outputs.version }}'
          $platform = '${{ matrix.platform }}'

          for ($attempt = 1; $attempt -le 5; $attempt++) {
              docker pull --platform $platform $image
              if ($LASTEXITCODE -eq 0) {
                  exit 0
              }

              if ($attempt -lt 5) {
                  Write-Host "Pull failed. Retrying in 10 seconds..."
                  Start-Sleep -Seconds 10
              }
          }

          exit $LASTEXITCODE

      - name: Test published image
        shell: pwsh
        run: ./unbound/test/Test-UnboundContainer.ps1 -Image '${{ env.FINAL_IMAGE_NAME }}:${{ needs.build.outputs.version }}' -Platform '${{ matrix.platform }}' -GitHubOutput
