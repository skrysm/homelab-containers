name: Publish Unbound image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/unbound"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Build version probe image
        uses: docker/build-push-action@v6
        with:
          context: ./unbound
          platforms: linux/amd64
          load: true
          tags: unbound-version-probe:local

      - name: Detect Unbound version
        id: version
        shell: pwsh
        run: ./unbound/Get-UnboundVersion.ps1 -Image unbound-version-probe:local -GitHubOutputName version

      - name: Publish multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: ./unbound
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
