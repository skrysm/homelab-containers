name: Publish Unbound image
run-name: "Publish Unbound image | ${{ github.event_name == 'schedule' && 'Scheduled' || github.event_name == 'workflow_dispatch' && 'Manual' || github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || github.event_name == 'push' && 'Push' || github.event_name }}"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  pull_request: # mainly for Dependabot update PRs
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  schedule:
    # Every day at 02:23 UTC.
    - cron: "23 2 * * *"
  workflow_dispatch:
    inputs:
      treat_as_scheduled_run:
        description: "Treat as 'scheduled' run (for testing purposes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write # for publishing new container images
  actions: write  # for cancelling the workflow run

env:
  FINAL_IMAGE_NAME: ghcr.io/${{ github.repository }}/unbound
  # Don't push the image from PRs.
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  prepare:
    name: Prepare image build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image
        uses: docker/build-push-action@v7
        env:
          # See: https://github.com/docker/build-push-action/tree/v7/#environment-variables
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./unbound
          platforms: linux/amd64
          load: true
          tags: homelab-unbound:candidate

      - name: Detect Unbound version
        id: version
        shell: pwsh
        run: ./unbound/Get-UnboundVersion.ps1 -Image homelab-unbound:candidate -GitHubOutputName version

      - name: Test Unbound container
        shell: pwsh
        run: ./unbound/test/Test-UnboundContainer.ps1 -Image homelab-unbound:candidate -GitHubOutput

      # Detects whether any packages in the candidate image have changed compared to the latest
      # published image and print the comparison to the GitHub Actions workflow summary.
      - name: Create package manifest comparison
        id: package_manifest_comparison
        shell: pwsh
        run: |
          $candidateImage = "homelab-unbound:candidate"
          $publishedImage = "${{ env.FINAL_IMAGE_NAME }}:latest"

          docker manifest inspect "$publishedImage" *> $null
          $publishedImageExists = $LASTEXITCODE -eq 0

          $summaryLines = @(
              "## Package manifest comparison"
              ""
              "**Comparison image:** ``$publishedImage``"
              ""
          )

          if (-not $publishedImageExists) {
              $packageManifestChanged = $true
              $comparisonReason = "No previous published image was found at '$publishedImage'."
              $packageComparisonMarkdownLines = @()
          }
          else {
              $packageComparison = ./scripts/Compare-AlpineImagePackages.ps1 `
                  -PublishedImage $publishedImage `
                  -CandidateImage $candidateImage `
                  -PassThru

              $packageManifestChanged = $packageComparison.PackageManifestChanged
              $packageComparisonMarkdownLines = @($packageComparison.MarkdownLines)

              if (-not $packageManifestChanged) {
                  $comparisonReason = "No package version changes between the candidate image and '$publishedImage'."
                  $packageComparisonMarkdownLines = @()
              }
              else {
                  $comparisonReason = "At least one package version changed between the candidate image and '$publishedImage'."
              }
          }

          Write-Host "Package manifest comparison result: $comparisonReason"

          "package_manifest_changed=$($packageManifestChanged.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($packageComparisonMarkdownLines.Count -gt 0) {
              $summaryLines += $packageComparisonMarkdownLines
          }
          elseif ($comparisonReason) {
              $summaryLines += $comparisonReason
          }

          $summaryLines >> $env:GITHUB_STEP_SUMMARY

      - name: Decide whether publishing is needed (for scheduled runs)
        if: github.event_name == 'schedule' || inputs.treat_as_scheduled_run
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Write-PublishDecision([bool] $ShouldPublish, [string] $Reason) {
              $decision = if ($ShouldPublish) { "✅ Publish image" } else { "⏭️ Do not publish image" }

              Write-Host "$($decision): $Reason"

              @(
                  "## Publish decision"
                  ""
                  "**Decision:** $decision"
                  ""
                  "**Reason:** $Reason"
              ) >> $env:GITHUB_STEP_SUMMARY
          }

          $publishedImage = "${{ env.FINAL_IMAGE_NAME }}:latest"

          $shouldPublish = '${{ steps.package_manifest_comparison.outputs.package_manifest_changed }}' -eq 'true'

          if ($shouldPublish) {
              docker manifest inspect "$publishedImage" *> $null
              $publishedImageExists = $LASTEXITCODE -eq 0

              if ($publishedImageExists) {
                  $reason = "The package manifest changed compared to '$publishedImage'."
              }
              else {
                  $reason = "No previous published image was found at '$publishedImage'."
              }
          }
          else {
              $reason = "The package manifest is unchanged compared to '$publishedImage'."
          }

          Write-PublishDecision `
              -ShouldPublish $shouldPublish `
              -Reason $reason

          if (-not $shouldPublish) {
              gh run cancel "${{ github.run_id }}" --repo "${{ github.repository }}"
              Start-Sleep -Seconds 30
              Write-Error "Cancellation request did not stop this run in time."
              exit 1
          }

  # NOTE: We still do this job on PRs - even though we don't push the image - to detect any problems
  #   inside this workflow before the PR is merged to the main branch.
  publish:
    name: ${{ github.event_name == 'pull_request' && 'Build image only (dry run)' || 'Publish image' }}
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        # NOTE: We skip this step here to make sure that these runs cannot push the container image by accident.
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,arm

      - name: Publish multi-platform image${{ github.event_name == 'pull_request' && ' (dry run)' || '' }}
        uses: docker/build-push-action@v7
        with:
          context: ./unbound
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: |
            ${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ${{ env.FINAL_IMAGE_NAME }}:latest
          # NOTE: Labels can be inspected via:
          #
          #   docker image inspect ghcr.io/skrysm/homelab-containers/unbound:latest --format '{{ json .Config.Labels }}' | jq
          #
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            build.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            build.dockerfile=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/unbound/Dockerfile
          # Add metadata (attestations; https://docs.docker.com/build/metadata/attestations/) to the
          # published image:
          #
          # * "provenance" records how the image was built
          # * "SBOM" records the packages/artifacts found in the image
          #
          # NOTE: GitHub's container registry UI shows these attestation manifests as an extra
          # "unknown/unknown" architecture entry; that is fine and can be ignored.
          provenance: true
          sbom: true

  verify-published:
    name: Verify published image (${{ matrix.platform }})

    needs:
      - prepare
      - publish

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            qemu_platform: ""
          - platform: linux/arm64
            qemu_platform: arm64
          - platform: linux/arm/v7
            qemu_platform: arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: matrix.qemu_platform != ''
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.qemu_platform }}

      - name: Pull published image
        shell: pwsh
        run: |
          $image = '${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}'
          $platform = '${{ matrix.platform }}'

          for ($attempt = 1; $attempt -le 5; $attempt++) {
              docker pull --platform $platform $image
              if ($LASTEXITCODE -eq 0) {
                  exit 0
              }

              if ($attempt -lt 5) {
                  Write-Host "Pull failed. Retrying in 10 seconds..."
                  Start-Sleep -Seconds 10
              }
          }

          exit $LASTEXITCODE

      - name: Test published image
        shell: pwsh
        run: ./unbound/test/Test-UnboundContainer.ps1 -Image '${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}' -Platform '${{ matrix.platform }}' -GitHubOutput
