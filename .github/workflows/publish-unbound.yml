name: Publish Unbound image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  pull_request: # mainly for Dependabot update PRs
    paths:
      - ".github/workflows/publish-unbound.yml"
      - "unbound/**"
  schedule:
    # Every day at 04:23 UTC.
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/unbound

jobs:
  build:
    name: Build and test image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build version probe image
        uses: docker/build-push-action@v6
        with:
          context: ./unbound
          platforms: linux/amd64
          load: true
          tags: unbound-version-probe:local

      - name: Detect Unbound version
        id: version
        shell: pwsh
        run: ./unbound/Get-UnboundVersion.ps1 -Image unbound-version-probe:local -GitHubOutputName version

      - name: Test Unbound container
        shell: pwsh
        run: ./unbound/test/Test-UnboundContainer.ps1 -Image unbound-version-probe:local -GitHubOutput

  publish:
    name: Publish image
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to publish
        id: publish
        shell: pwsh
        run: |
          $tag = "${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}"

          docker manifest inspect "$tag" *> $null
          $tagExists = $LASTEXITCODE -eq 0

          if ($tagExists) {
              Write-Host "Image tag already exists: $tag"
          }
          else {
              Write-Host "Image tag does not exist yet: $tag"
          }

          if ("${{ github.event_name }}" -eq "schedule" -and $tagExists) {
              "enabled=false" >> $env:GITHUB_OUTPUT
              Write-Host "Scheduled run found no new Unbound version. Skipping publish."
          }
          else {
              "enabled=true" >> $env:GITHUB_OUTPUT
              Write-Host "Publishing image for Unbound ${{ needs.build.outputs.version }}."
          }

      - name: Set up QEMU
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Publish multi-platform image
        if: steps.publish.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./unbound
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
