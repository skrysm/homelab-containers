name: Pull Requests
run-name: "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

on:
  # IMPORTANT: Always run this workflow (i.e. no path filter) so the required gate job is reported
  # even when no container images have changed.
  pull_request:

# This concurrency group is primarily for making sure that GHA cache always gets
# the latest build (i.e. by cancelling a running workflow run if a new commit is
# pushed to the PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  select-container-images:
    name: Determine container images to process
    runs-on: ubuntu-latest
    outputs:
      selected_images: ${{ steps.selection.outputs.selected_images }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Select container images
        id: selection
        uses: ./.github/actions/select-container-images
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          selection-mode: changed

  validate-container-images:
    name: "Validate: ${{ matrix.image }}"
    needs: select-container-images
    if: needs.select-container-images.outputs.selected_images != '[]'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.select-container-images.outputs.selected_images) }}
    uses: ./.github/workflows/single-container-image.yml
    with:
      image-name: ${{ matrix.image }}
      publish: false
      use-build-cache: true

  # This job is the(!) required check in the GitHub PR ruleset.
  build-gate:
    name: PR Build Gate
    needs:
      - select-container-images
      - validate-container-images
    # NOTE: This job must always run - even if no container images have been touched. This is important because
    #   this job is the required check for all PRs and PRs that don't touch any container images wouldn't be able
    #   merge without this.
    if: always()
    runs-on: ubuntu-slim

    steps:
      - name: Verify required image validations succeeded
        shell: pwsh
        run: |
          # Required because of "if: always()"
          if ('${{ needs.select-container-images.result }}' -ne 'success') {
              throw 'Container image selection did not succeed.'
          }

          $selectedImages = @(ConvertFrom-Json -InputObject '${{ needs.select-container-images.outputs.selected_images }}')
          $validationResult = '${{ needs.validate-container-images.result }}'

          Write-Host "Selected images: $($selectedImages -join ', ')"
          Write-Host "Container image validation result: $validationResult"

          if ($selectedImages.Count -eq 0 -and $validationResult -ne 'skipped') {
              throw 'Container image validation was not skipped even though no container images were selected.'
          }

          if ($selectedImages.Count -gt 0 -and $validationResult -ne 'success') {
              throw 'Container image validation did not succeed.'
          }
