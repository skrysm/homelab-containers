name: Container images
run-name: "Container images | ${{ github.event_name == 'pull_request' && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title) || 'Push' }}"

on:
  # IMPORTANT: Always run this workflow (i.e. no path filter) so the required gate job is reported
  # even when no container images have changed.
  pull_request:

  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/_publish-container-image.yml"
      - ".github/workflows/container-images.yml"
      - "container-images/**"

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed container images
    runs-on: ubuntu-latest
    outputs:
      changed_images: ${{ steps.changes.outputs.changed_images }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed container images
        id: changes
        uses: ./.github/actions/detect-changed-container-images
        with:
          base-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

  validate-container-images:
    name: ${{ github.event_name == 'pull_request' && 'Validate' || 'Publish' }} ${{ matrix.image }} image
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_images != '[]'
    permissions:
      contents: read
      packages: write
      actions: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.detect-changes.outputs.changed_images) }}
    uses: ./.github/workflows/_publish-container-image.yml
    with:
      image-name: ${{ matrix.image }}

  # This job is the required check in the GitHub PR ruleset.
  build-gate:
    name: Build gate
    needs:
      - detect-changes
      - validate-container-images
    # NOTE: This job must always run - even if no container images have been touched. This is important because
    #   this job is the required check for all PRs and PRs that don't touch any container images wouldn't be able
    #   merge without this.
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify required image validations succeeded
        shell: pwsh
        run: |
          # Required because of "if: always()"
          if ('${{ needs.detect-changes.result }}' -ne 'success') {
              throw 'Container image change detection did not succeed.'
          }

          $changedImages = @(ConvertFrom-Json -InputObject '${{ needs.detect-changes.outputs.changed_images }}')
          $validationResult = '${{ needs.validate-container-images.result }}'

          Write-Host "Changed images: $($changedImages -join ', ')"
          Write-Host "Container image validation result: $validationResult"

          if ($changedImages.Count -eq 0 -and $validationResult -ne 'skipped') {
              throw 'Container image validation was not skipped even though no container images changed.'
          }

          if ($changedImages.Count -gt 0 -and $validationResult -ne 'success') {
              throw 'Container image validation did not succeed.'
          }
