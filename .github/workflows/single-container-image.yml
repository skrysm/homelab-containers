name: Single container image
# NOTE: The run-name is irrelevant for runs triggered by the "workflow_call" trigger (as it's not shown anywhere in this case)
run-name: "${{ inputs.publish && 'Publish' || 'Build' }} container image | ${{ inputs.image-name }}"

on:
  workflow_call:
    inputs:
      image-name:
        description: Container image to process.
        type: string
        required: true
      publish:
        description: Publish the successfully validated container image.
        type: boolean
        required: true
      use-build-cache:
        description: Use the GitHub Actions cache for Docker builds.
        type: boolean
        required: false
        default: false
      treat_as_scheduled_run:
        description: "Treat as 'scheduled' run (for testing purposes)"
        type: boolean
        required: false
        default: false

  workflow_dispatch:
    inputs:
      image-name:
        description: Container image to process.
        type: choice
        required: true
        options:
          - ansible-devcontainer
          - unbound
      publish:
        description: Publish the successfully validated container image.
        type: boolean
        required: false
        default: false
      treat_as_scheduled_run:
        description: "Treat as 'scheduled' run (for testing purposes)."
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write # for publishing new container images

env:
  BUILD_CONTEXT: container-images/${{ inputs.image-name }}
  CANDIDATE_IMAGE: ${{ inputs.image-name }}:candidate
  FINAL_IMAGE_NAME: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}

jobs:
  build-and-publish:
    name: "${{ inputs.publish && 'Publish container image' || 'Build container image (no publish)' }}"
    runs-on: ubuntu-latest
    outputs:
      platform_matrix: ${{ steps.configuration.outputs.platform_matrix }}
      publish_image: ${{ steps.publish_decision.outputs.publish_image }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Load container image configuration
        id: configuration
        shell: pwsh
        run: |
          $configurationPath = './${{ env.BUILD_CONTEXT }}/container-image-config.yml'

          if (-not (Test-Path $configurationPath -PathType Leaf)) {
              throw "Container image configuration '$configurationPath' was not found."
          }

          # Convert YAML to JSON first as PowerShell doesn't support YAML natively.
          $configurationJson = & yq eval --output-format json --indent 0 '.' $configurationPath
          if ($LASTEXITCODE -ne 0) {
              throw "Failed to parse container image configuration '$configurationPath'."
          }

          $configuration = ConvertFrom-Json -InputObject $configurationJson

          $platforms = @(
              $configuration.docker_platforms |
                  ForEach-Object { ([string] $_).Trim() } |
                  Where-Object { $_ } |
                  Select-Object -Unique
          )

          if ($platforms.Count -eq 0) {
              throw "Container image configuration '$configurationPath' must specify at least one Docker platform."
          }

          $comparisonMethod = ([string] $configuration.comparison_method).Trim()

          "platforms=$($platforms -join ',')" >> $env:GITHUB_OUTPUT
          "platform_matrix=$(ConvertTo-Json -InputObject @($platforms) -Compress)" >> $env:GITHUB_OUTPUT
          "comparison_method=$comparisonMethod" >> $env:GITHUB_OUTPUT

          # Required so that this step doesn't fail if $LASTEXITCODE is still non-zero.
          exit 0

      - name: Configure Docker build cache
        id: build_cache
        if: inputs.use-build-cache
        shell: pwsh
        run: |
          # Use a fresh cache each day so unpinned package installations inside the container
          # images are refreshed at least daily.
          # NOTE: The cache is automatically scoped to a PR, i.e. PR 1 can't read or write
          #   the cache of PR 2.
          $cacheScope = '${{ inputs.image-name }}-' + [DateTime]::UtcNow.ToString('yyyy-MM-dd')

          "cache_from=type=gha,scope=$cacheScope" >> $env:GITHUB_OUTPUT
          "cache_to=type=gha,scope=$cacheScope,mode=max" >> $env:GITHUB_OUTPUT

      # It's recommended to run this before "setup-buildx-action".
      # See: https://github.com/docker/setup-qemu-action#usage
      - name: Set up QEMU for Docker
        uses: ./.github/actions/setup-qemu-for-docker
        with:
          platforms: ${{ steps.configuration.outputs.platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate container image
        uses: docker/build-push-action@v7
        env:
          # See: https://github.com/docker/build-push-action/tree/v7/#environment-variables
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./${{ env.BUILD_CONTEXT }}
          platforms: linux/amd64
          load: true
          tags: ${{ env.CANDIDATE_IMAGE }}
          cache-from: ${{ steps.build_cache.outputs.cache_from }}

      - name: Test candidate container image
        shell: pwsh
        run: |
          & './${{ env.BUILD_CONTEXT }}/test/Test-Container.ps1' -Image '${{ env.CANDIDATE_IMAGE }}' -GitHubOutput

      - name: Determine new container image tag
        id: version
        shell: pwsh
        run: |
          $version = & './${{ env.BUILD_CONTEXT }}/Get-ContainerImageVersion.ps1' -Image '${{ env.CANDIDATE_IMAGE }}'

          "version=$version" >> $env:GITHUB_OUTPUT

          @(
              "## Container image version"
              ""
              "The primary software version detected inside the candidate image is used as the container image tag."
              ""
              "**Image:** ``${{ inputs.image-name }}``"
              ""
              "**Detected version:** ``$version``"
          ) >> $env:GITHUB_STEP_SUMMARY

      - name: Compare candidate container image to latest published
        id: container_image_comparison
        uses: ./.github/actions/compare-container-images
        with:
          build-context: ./${{ env.BUILD_CONTEXT }}
          comparison-method: ${{ steps.configuration.outputs.comparison_method }}
          candidate-image: ${{ env.CANDIDATE_IMAGE }}
          published-image: ${{ env.FINAL_IMAGE_NAME }}:latest

      - name: Decide on image publishing
        id: publish_decision
        shell: pwsh
        run: |
          $changesDetected = switch ('${{ steps.container_image_comparison.outputs.changes_detected }}') {
              'true' { $true }
              'false' { $false }
              default { throw "Invalid changes-detected value '$_'. Expected 'true' or 'false'." }
          }
          $publishRequested = '${{ inputs.publish }}' -eq 'true'
          $isScheduledRun = '${{ github.event_name }}' -eq 'schedule' -or '${{ inputs.treat_as_scheduled_run }}' -eq 'true'

          # Stop scheduled runs when no changes were detected; continue in any other case.
          $continueWorkflow = (-not $isScheduledRun) -or $changesDetected
          $publishImage = $publishRequested -and $continueWorkflow

          Write-Host "Continue workflow: $continueWorkflow"
          Write-Host "Publish requested: $publishRequested"
          Write-Host "Publish image: $publishImage"

          "continue_workflow=$($continueWorkflow.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "publish_image=$($publishImage.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        # NOTE: We skip this step here to make sure that these runs cannot push the container image by accident.
        if: steps.publish_decision.outputs.publish_image == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: We still do this step on PRs - even though we don't push the image - to detect any problems
      #   inside this workflow before the PR is merged to the main branch.
      - name: ${{ steps.publish_decision.outputs.publish_image == 'true' && 'Publish multi-platform image' || 'Build multi-platform image (no publish)' }}
        if: steps.publish_decision.outputs.continue_workflow == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.BUILD_CONTEXT }}
          platforms: ${{ steps.configuration.outputs.platforms }}
          push: ${{ steps.publish_decision.outputs.publish_image == 'true' }}
          cache-from: ${{ steps.build_cache.outputs.cache_from }}
          cache-to: ${{ steps.build_cache.outputs.cache_to }}
          tags: |
            ${{ env.FINAL_IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.FINAL_IMAGE_NAME }}:latest
          # NOTE: Labels can be inspected via:
          #
          #   docker image inspect <image-name>:latest --format '{{ json .Config.Labels }}' | jq
          #
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            build.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            build.dockerfile=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/${{ env.BUILD_CONTEXT }}/Dockerfile
          # Add metadata (attestations; https://docs.docker.com/build/metadata/attestations/) to the
          # published image:
          #
          # * "provenance" records how the image was built
          # * "SBOM" records the packages/artifacts found in the image
          #
          # NOTE: GitHub's container registry UI shows these attestation manifests as an extra
          # "unknown/unknown" architecture entry; that is fine and can be ignored.
          provenance: true
          sbom: true

  verify-published:
    name: Verify published image | ${{ matrix.platform }}

    needs:
      - build-and-publish

    if: needs.build-and-publish.outputs.publish_image == 'true'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.build-and-publish.outputs.platform_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: ./.github/actions/setup-qemu-for-docker
        with:
          platforms: ${{ matrix.platform }}

      - name: Pull published image
        shell: pwsh
        run: |
          $image = '${{ env.FINAL_IMAGE_NAME }}:${{ needs.build-and-publish.outputs.version }}'
          $platform = '${{ matrix.platform }}'

          for ($attempt = 1; $attempt -le 5; $attempt++) {
              docker pull --platform $platform $image
              if ($LASTEXITCODE -eq 0) {
                  exit 0
              }

              if ($attempt -lt 5) {
                  Write-Host "Pull failed. Retrying in 10 seconds..."
                  Start-Sleep -Seconds 10
              }
          }

          exit $LASTEXITCODE

      - name: Test published image
        shell: pwsh
        run: |
          & './${{ env.BUILD_CONTEXT }}/test/Test-Container.ps1' `
              -Image '${{ env.FINAL_IMAGE_NAME }}:${{ needs.build-and-publish.outputs.version }}' `
              -Platform '${{ matrix.platform }}' `
              -GitHubOutput
