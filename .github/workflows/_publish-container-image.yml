name: Publish container image

on:
  workflow_call:
    inputs:
      image-name:
        description: Name of the image and its build-context directory containing container-image-config.yml.
        type: string
        required: true
      treat_as_scheduled_run:
        description: "Treat as 'scheduled' run (for testing purposes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write # for publishing new container images
  actions: write  # for cancelling the workflow run

env:
  CANDIDATE_IMAGE: ${{ inputs.image-name }}:candidate
  FINAL_IMAGE_NAME: ghcr.io/${{ github.repository }}/${{ inputs.image-name }}

jobs:
  prepare:
    name: Prepare image build
    runs-on: ubuntu-latest
    outputs:
      platforms: ${{ steps.configuration.outputs.platforms }}
      platform_matrix: ${{ steps.configuration.outputs.platform_matrix }}
      # Pull request runs build and test the image without publishing it.
      publish_image: ${{ github.event_name != 'pull_request' }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Load container image configuration
        id: configuration
        shell: pwsh
        run: |
          $configurationPath = './${{ inputs.image-name }}/container-image-config.yml'

          if (-not (Test-Path $configurationPath -PathType Leaf)) {
              throw "Container image configuration '$configurationPath' was not found."
          }

          # Convert YAML to JSON first as PowerShell doesn't support YAML natively.
          $configurationJson = & yq eval --output-format json --indent 0 '.' $configurationPath
          if ($LASTEXITCODE -ne 0) {
              throw "Failed to parse container image configuration '$configurationPath'."
          }

          $configuration = ConvertFrom-Json -InputObject $configurationJson

          $platforms = @(
              $configuration.docker_platforms |
                  ForEach-Object { ([string] $_).Trim() } |
                  Where-Object { $_ } |
                  Select-Object -Unique
          )

          if ($platforms.Count -eq 0) {
              throw "Container image configuration '$configurationPath' must specify at least one Docker platform."
          }

          $comparisonMethod = ([string] $configuration.comparison_method).Trim()

          "platforms=$($platforms -join ',')" >> $env:GITHUB_OUTPUT
          "platform_matrix=$(ConvertTo-Json -InputObject @($platforms) -Compress)" >> $env:GITHUB_OUTPUT
          "comparison_method=$comparisonMethod" >> $env:GITHUB_OUTPUT

          # Required so that this step doesn't fail if $LASTEXITCODE is still non-zero.
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build candidate image
        uses: docker/build-push-action@v7
        env:
          # See: https://github.com/docker/build-push-action/tree/v7/#environment-variables
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./${{ inputs.image-name }}
          platforms: linux/amd64
          load: true
          tags: ${{ env.CANDIDATE_IMAGE }}

      - name: Detect container version
        id: version
        shell: pwsh
        run: |
          $version = & './${{ inputs.image-name }}/Get-ContainerVersion.ps1' -Image '${{ env.CANDIDATE_IMAGE }}'

          "version=$version" >> $env:GITHUB_OUTPUT

          @(
              "## Container image version"
              ""
              "**Detected version:** ``$version``"
          ) >> $env:GITHUB_STEP_SUMMARY

      - name: Test container
        shell: pwsh
        run: |
          & './${{ inputs.image-name }}/test/Test-Container.ps1' -Image '${{ env.CANDIDATE_IMAGE }}' -GitHubOutput

      - name: Compare container images
        id: container_image_comparison
        uses: ./.github/actions/compare-container-images
        with:
          build-context: ./${{ inputs.image-name }}
          comparison-method: ${{ steps.configuration.outputs.comparison_method }}
          candidate-image: ${{ env.CANDIDATE_IMAGE }}
          published-image: ${{ env.FINAL_IMAGE_NAME }}:latest

      - name: Decide whether publishing is needed (for scheduled runs)
        if: github.event_name == 'schedule' || inputs.treat_as_scheduled_run
        uses: ./.github/actions/cancel-run-if-no-changes
        with:
          changes-detected: ${{ steps.container_image_comparison.outputs.changes_detected }}
          published-image: ${{ env.FINAL_IMAGE_NAME }}:latest

  # NOTE: We still do this job on PRs - even though we don't push the image - to detect any problems
  #   inside this workflow before the PR is merged to the main branch.
  publish:
    name: ${{ needs.prepare.outputs.publish_image == 'true' && 'Publish image' || 'Build image only (dry run)' }}
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # It's recommended to run this before "setup-buildx-action".
      # See: https://github.com/docker/setup-qemu-action#usage
      - name: Set up QEMU for Docker
        uses: ./.github/actions/setup-qemu-for-docker
        with:
          platforms: ${{ needs.prepare.outputs.platforms }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        # NOTE: We skip this step here to make sure that these runs cannot push the container image by accident.
        if: needs.prepare.outputs.publish_image == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ${{ needs.prepare.outputs.publish_image == 'true' && 'Publish multi-platform image' || 'Publish multi-platform image (dry run)' }}
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.image-name }}
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: ${{ needs.prepare.outputs.publish_image == 'true' }}
          tags: |
            ${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ${{ env.FINAL_IMAGE_NAME }}:latest
          # NOTE: Labels can be inspected via:
          #
          #   docker image inspect <image-name>:latest --format '{{ json .Config.Labels }}' | jq
          #
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            build.url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            build.dockerfile=${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/${{ inputs.image-name }}/Dockerfile
          # Add metadata (attestations; https://docs.docker.com/build/metadata/attestations/) to the
          # published image:
          #
          # * "provenance" records how the image was built
          # * "SBOM" records the packages/artifacts found in the image
          #
          # NOTE: GitHub's container registry UI shows these attestation manifests as an extra
          # "unknown/unknown" architecture entry; that is fine and can be ignored.
          provenance: true
          sbom: true

  verify-published:
    name: Verify published image (${{ matrix.platform }})

    needs:
      - prepare
      - publish

    if: needs.prepare.outputs.publish_image == 'true'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.prepare.outputs.platform_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: ./.github/actions/setup-qemu-for-docker
        with:
          platforms: ${{ matrix.platform }}

      - name: Pull published image
        shell: pwsh
        run: |
          $image = '${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}'
          $platform = '${{ matrix.platform }}'

          for ($attempt = 1; $attempt -le 5; $attempt++) {
              docker pull --platform $platform $image
              if ($LASTEXITCODE -eq 0) {
                  exit 0
              }

              if ($attempt -lt 5) {
                  Write-Host "Pull failed. Retrying in 10 seconds..."
                  Start-Sleep -Seconds 10
              }
          }

          exit $LASTEXITCODE

      - name: Test published image
        shell: pwsh
        run: |
          & './${{ inputs.image-name }}/test/Test-Container.ps1' `
              -Image '${{ env.FINAL_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}' `
              -Platform '${{ matrix.platform }}' `
              -GitHubOutput
