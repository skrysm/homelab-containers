name: Cancel run if no changes
description: Cancel a workflow run when no container image changes were detected.

inputs:
  changes-detected:
    description: Whether the candidate image differs from the published image.
    required: true
  published-image:
    description: Published container image that the candidate image was compared against.
    required: true

runs:
  using: composite
  steps:
    - name: Cancel run if no changes
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        & "$env:GITHUB_ACTION_PATH/Cancel-RunIfNoChanges.ps1" `
            -ChangesDetected '${{ inputs.changes-detected }}' `
            -PublishedImage '${{ inputs.published-image }}' `
            -RunId '${{ github.run_id }}' `
            -Repository '${{ github.repository }}'
