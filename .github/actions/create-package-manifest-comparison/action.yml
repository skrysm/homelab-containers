name: Create package manifest comparison
description: Compare Alpine package manifests between a candidate image and a published image.

inputs:
  candidate-image:
    description: Candidate Docker image to compare.
    required: true
  published-image:
    description: Published Docker image to compare against.
    required: true

outputs:
  package_manifest_changed:
    description: Whether the package manifest changed between the candidate and published image.
    value: ${{ steps.package_manifest_comparison.outputs.package_manifest_changed }}

runs:
  using: composite
  steps:
    - name: Create package manifest comparison
      id: package_manifest_comparison
      shell: pwsh
      run: |
        & "$env:GITHUB_ACTION_PATH/Create-PackageManifestComparison.ps1" `
            -CandidateImage '${{ inputs.candidate-image }}' `
            -PublishedImage '${{ inputs.published-image }}'
