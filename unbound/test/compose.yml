services:
  unbound:
    image: ${UNBOUND_TEST_IMAGE:-homelab-unbound:local}
    platform: ${UNBOUND_TEST_PLATFORM:-}
    ports:
      - "127.0.0.1:53:53/tcp"
      - "127.0.0.1:53:53/udp"
    volumes:
      - type: bind
        source: ./unbound.test.conf
        target: /etc/unbound/unbound.conf.d/test.conf
        read_only: true
