server:
    # Make Unbound listen for requests from the Docker network. The default is to
    # listen only on 127.0.0.1/::1, which does not work for published container ports.
    interface: 0.0.0.0

    # Alpine's packaged Unbound config requests a 4 MiB socket send buffer by
    # default. Containers often cannot raise it to that value, which causes Unbound
    # to warn on startup. Use the system default instead.
    so-sndbuf: 0
